apiVersion: v1
kind: Service
metadata:
  name: clean-signed-service
  namespace: pep-test
spec:
  type: NodePort
  selector:
    app: clean-signed-app
  ports:
    - port: 80          # service port (unchanged)
      targetPort: 8080  # container now listens on 8080
      nodePort: 30221   # external NodePort (unchanged)